AutoName: Steam Server Browser

RepoType: git
Repo: https://github.com/surf5726/SteamServerBrowserAndroid

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: v1.0.0
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@3.41.7
    prebuild:
      - echo "flutter.sdk=$$flutter$$" >> android/local.properties
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --target-platform android-arm64 --dart-define=cronetHttpNoPlay=true

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
CurrentVersion: 1.0.0
CurrentVersionCode: 1
